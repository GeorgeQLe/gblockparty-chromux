<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chromux — Design Viewer</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; margin: 0; overflow: hidden;
    background: #080a0f;
  }
  body {
    display: grid; place-items: center;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  #viewer-shell { position: relative; flex: none; overflow: visible; }
  #design-canvas {
    position: absolute; inset: 0 auto auto 0;
    display: block; width: 1440px; height: 900px; border: 0;
    transform: scale(var(--design-scale, 1)); transform-origin: top left;
    background: #080a0f;
  }
  #viewer-error {
    max-width: 560px; margin: 24px; padding: 24px;
    border: 1px solid #343b4d; background: #11151f; color: #d8deeb;
    font-size: 14px; line-height: 1.6;
  }
  #viewer-error strong { display: block; margin-bottom: 8px; color: #ffb454; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<div id="viewer-shell" hidden></div>
<div id="viewer-error" role="alert" hidden>
  <strong>Design unavailable</strong>
  Choose a desktop concept from the Chromux design gallery.
</div>
<script>
  window.CHROMUX_DESIGN = null;
</script>
<script>
(function () {
  'use strict';

  var CANVAS_WIDTH = 1440;
  var CANVAS_HEIGHT = 900;
  var allowed = new Set([
    '01-paper-terminal.html', '02-phosphor.html', '03-halo.html',
    '04-foreman.html', '05-atelier.html', '06-blueprint.html',
    '07-observatory.html', '08-neon-noir.html', '09-retro-os.html',
    '10-brutalist-mono.html', '11-solarpunk.html', '12-memphis.html',
    '13-e-ink.html', '14-streak.html', '15-offset.html',
    '16-liquid-glass.html', '17-mission-patch.html', '18-cartographer.html',
    '19-darkroom.html', '20-bauhaus-console.html', '21-library-stacks.html',
    '22-analog-synth.html', '23-air-traffic-control.html', '24-executive-glass.html',
    '25-comic-control-room.html', '26-field-notebook.html', '27-broadcast-studio.html',
    '28-museum-archive.html', '29-kinetic-typography.html', '30-cybernetic-organism.html',
    '31-medieval-scriptorium.html', '32-financial-terminal.html', '33-japanese-station.html',
    '34-thermal-industrial.html', '35-soundstage-blueprint.html', '36-chromatic-shadow.html'
  ]);
  var configured = window.CHROMUX_DESIGN;
  var requested = configured && configured.filename;

  if (!requested) {
    requested = new URLSearchParams(window.location.search).get('design');
  }

  if (!allowed.has(requested)) {
    document.getElementById('viewer-error').hidden = false;
    return;
  }

  var source = configured && configured.src;
  if (!source) {
    source = window.location.protocol === 'file:' ? requested : 'raw/' + requested;
  }

  if (configured && configured.title) {
    document.title = configured.title;
  }

  var shell = document.getElementById('viewer-shell');
  var frame = document.createElement('iframe');
  frame.id = 'design-canvas';
  frame.title = configured && configured.title ? configured.title : 'Chromux desktop design concept';
  frame.src = source;
  frame.setAttribute('data-canvas-width', String(CANVAS_WIDTH));
  frame.setAttribute('data-canvas-height', String(CANVAS_HEIGHT));
  shell.appendChild(frame);
  shell.hidden = false;

  frame.addEventListener('load', function () {
    if (!(configured && configured.title)) {
      try { document.title = frame.contentDocument.title; } catch (_) {}
    }
  });

  function fitCanvas() {
    var viewport = window.visualViewport;
    var width = viewport ? viewport.width : window.innerWidth;
    var height = viewport ? viewport.height : window.innerHeight;
    var scale = Math.min(1, width / CANVAS_WIDTH, height / CANVAS_HEIGHT);

    shell.style.width = (CANVAS_WIDTH * scale) + 'px';
    shell.style.height = (CANVAS_HEIGHT * scale) + 'px';
    frame.style.setProperty('--design-scale', String(scale));
    frame.dataset.scale = String(scale);
  }

  fitCanvas();
  window.addEventListener('resize', fitCanvas, { passive: true });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fitCanvas, { passive: true });
  }
})();
</script>
</body>
</html>
